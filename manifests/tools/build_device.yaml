id: build_device
module: mcp/tools/device/build_device
names:
  mcp: build_device
  cli: build
description: Build for device.
outputSchema:
  schema: xcodebuildmcp.output.build-result
  version: '3'
predicates:
  - hideWhenXcodeAgentMode
annotations:
  title: Build Device
  readOnlyHint: false
  destructiveHint: false
  openWorldHint: false
nextSteps:
  - label: Get built device app path
    toolId: get_device_app_path
    priority: 1
    when: success
    condition: app_build_succeeded
  - label: Run prepared tests
    toolId: test_device
    when: success
    condition: prepared_tests_available
