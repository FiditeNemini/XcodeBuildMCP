]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]

# Remote skills from getsentry/skills

[[skills]]
name = "find-bugs"
remote = "getsentry/skills"
paths = ["src/**/*.ts", "scripts/**/*.{js,mjs,ts}"]
ignorePaths = [
  "**/*.test.ts",
  "**/__tests__/**",
  "**/__fixtures__/**",
  "**/__snapshots__/**",
]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]

[[skills]]
