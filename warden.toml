# Warden Configuration
# https://github.com/getsentry/warden
#
# PR reviews are executed by the organization-managed Warden workflow. The repository watchdog
# cancels any Warden run that exceeds ten minutes. Keep this PR skill set intentionally small:
# each automatic check must have demonstrated unique, actionable findings.

version = 1

[defaults]
failOn = "high"
reportOn = "medium"
reportOnSuccess = false

# Full-repository review remains scheduled and never runs on PR events.
[[skills]]
name = "warden-sweep"
paths = ["src/**/*.ts", "scripts/**/*.{js,mjs,sh,ts}"]
ignorePaths = [
  "**/*.test.ts",
  "**/__tests__/**",
  "**/__fixtures__/**",
  "**/__snapshots__/**",
]

[[skills.triggers]]
type = "schedule"

[skills.triggers.schedule]
issueTitle = "Warden weekly sweep"
createFixPR = true
fixBranchPrefix = "warden-sweep"

# High-value PR reviews. maxTurns is deliberately capped so a single skill cannot monopolize the
# ten-minute workflow budget.
[[skills]]
name = "xcodebuildmcp-snapshot-fixture-review"
maxTurns = 3
maxFindings = 3
paths = [
  "src/snapshot-tests/contracts.ts",
  "src/snapshot-tests/fixture-io.ts",
  "src/snapshot-tests/__tests__/fixture-io.test.ts",
  "src/snapshot-tests/__tests__/json-normalize.test.ts",
  "src/snapshot-tests/__tests__/json-fixture-schema.test.ts",
  "src/snapshot-tests/__fixtures__/**",
]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]

[[skills]]
name = "find-bugs"
remote = "getsentry/skills@b10e2db21d3165de1904bdf3fa64285016765fe5"
maxTurns = 4
maxFindings = 3
paths = [
  "src/cli.ts",
  "src/cli/**",
  "src/daemon.ts",
  "src/daemon/**",
  "src/doctor-cli.ts",
  "src/integrations/**",
  "src/mcp/resources/**",
  "src/mcp/tools/**",
  "src/runtime/**",
  "src/server/**",
  "src/utils/execution/**",
  "scripts/**/*.{js,mjs,ts}",
]
ignorePaths = [
  "**/*.test.ts",
  "**/__tests__/**",
  "**/__fixtures__/**",
  "**/__snapshots__/**",
]

[[skills.triggers]]
type = "pull_request"
actions = ["opened", "synchronize", "reopened"]

# Targeted domain reviews run only when explicitly selected for high-risk changes.
[[skills]]
name = "xcodebuildmcp-runtime-boundary-review"
maxTurns = 8
maxFindings = 5
paths = [
  "src/runtime/tool-catalog.ts",
  "src/runtime/tool-invoker.ts",
  "src/runtime/types.ts",
  "src/cli/**",
  "src/daemon/**",
  "manifests/tools/*.yaml",
  "manifests/workflows/*.yaml",
  "xcodebuildmcp.com/app/docs/_content/architecture-runtime-boundaries.mdx",
  "xcodebuildmcp.com/app/docs/_content/architecture-manifest-visibility.mdx",
]

[[skills.triggers]]
type = "local"

[[skills]]
name = "xcodebuildmcp-test-boundary-review"
maxTurns = 8
maxFindings = 5
paths = [
  "src/**/__tests__/**",
  "src/test-utils/**",
  "src/snapshot-tests/**",
  "scripts/**/__tests__/**",
  "package.json",
  "xcodebuildmcp.com/app/docs/_content/testing.mdx",
  "xcodebuildmcp.com/app/docs/_content/contributing.mdx",
]
ignorePaths = ["src/snapshot-tests/__fixtures__/**"]

[[skills.triggers]]
type = "local"

[[skills]]
name = "xcodebuildmcp-tool-contract-review"
maxTurns = 8
maxFindings = 5
paths = [
  "src/mcp/tools/**",
  "src/core/manifest/schema.ts",
  "src/runtime/tool-catalog.ts",
  "src/runtime/types.ts",
  "manifests/tools/*.yaml",
  "manifests/workflows/*.yaml",
  "xcodebuildmcp.com/app/docs/_content/tool-authoring.mdx",
  "xcodebuildmcp.com/app/docs/_content/architecture-manifest-visibility.mdx",
]

[[skills.triggers]]
type = "local"

